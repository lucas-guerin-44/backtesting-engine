services:
  api:
    build: .
    command: uvicorn api:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    env_file:
      - .env

  dashboard:
    build: .
    command: streamlit run frontend.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - LOCAL_API_URL=http://api:8001
    depends_on:
      - api
